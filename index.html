<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké Ahorcado</title>
    <style>
        :root {
            --poke-red: #ff0000;
            --poke-blue: #3b4cca;
            --poke-yellow: #ffcb05;
            --poke-gold: #c7a008;
            --dark-bg: #212121;
            --tile-bg: #303030;
            --correct: #538d4e;
            --present: #b59f3b;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        /* Cabecera Estilo Pokémon */
        header {
            background: var(--poke-red);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            border-bottom: 5px solid var(--poke-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            color: var(--poke-yellow);
            text-shadow: 3px 3px var(--poke-blue);
            letter-spacing: 3px;
            font-size: 2rem;
            -webkit-text-stroke: 1px var(--poke-blue);
        }

        /* Pantalla de juego (Pokédex style) */
        #game-screen {
            background: #444;
            border: 10px solid #cc0000;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #word-grid {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tile {
            width: 45px;
            height: 45px;
            background: var(--tile-bg);
            border: 3px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 5px;
            color: transparent; /* Oculta la letra inicialmente */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile.revealed {
            background-color: var(--correct);
            border-color: #2e4d2a;
            color: white;
            transform: scale(1.1);
        }

        /* Botones de Pistas */
        .hints { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-hint {
            background: var(--poke-blue);
            color: white;
            border: 2px solid var(--poke-yellow);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
        }
        .btn-hint:hover { background: #2a38a3; }

        #hint-display {
            background: #d1e8d1;
            color: #222;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
            width: 100%;
            text-align: center;
            min-height: 20px;
            border-left: 5px solid #538d4e;
        }

        /* Input y Enviar */
        .controls { display: flex; gap: 10px; align-items: center; }
        #letter-input {
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
            text-align: center;
            border-radius: 10px;
            border: 4px solid var(--poke-blue);
            background: white;
            color: #333;
            text-transform: uppercase;
        }

        .btn-action {
            background: var(--poke-yellow);
            color: var(--poke-blue);
            border: 3px solid var(--poke-blue);
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-surrender { background: #eee; color: #333; border-color: #999; }

        /* Letras Descartadas */
        .discarded {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        .discarded-title { font-size: 0.7rem; color: #aaa; margin-bottom: 10px; }
        #letters-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .bad-letter {
            background: #333;
            color: #777;
            width: 30px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid #444;
        }

        /* Modal Resultado */
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 10; }
        #result-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #333; padding: 25px; border-radius: 20px; z-index: 11; width: 85%; max-width: 350px; text-align: center;
            border: 8px solid var(--poke-blue);
        }
        #result-modal img { width: 160px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); }
        #result-modal h2 { color: var(--poke-red); margin-top: 0; }
        #result-modal p { font-size: 0.9rem; line-height: 1.4; text-align: justify; background: #f9f9f9; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>POKÉ AHORCADO</h1>
    </header>

    <div id="game-screen">
        <div class="hints">
            <button class="btn-hint" onclick="getHint('region')">Pista: Región</button>
            <button class="btn-hint" onclick="getHint('type')">Pista: Tipo</button>
        </div>
        
        <div id="hint-display">¡Adivina el Pokémon!</div>

        <div id="word-grid"></div>

        <div class="controls">
            <input type="text" id="letter-input" maxlength="1" autocomplete="off" autofocus>
            <button class="btn-action" onclick="checkLetter()">LANZAR POKÉBALL</button>
        </div>
        
        <button class="btn-action btn-surrender" style="margin-top: 15px; width: 100%;" onclick="endGame(true)">ESCAPAR DEL COMBATE</button>

        <div class="discarded">
            <div class="discarded-title">LETRAS FALLIDAS</div>
            <div id="letters-box"></div>
        </div>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title"></h2>
        <img id="poke-img" src="" alt="">
        <h3 id="poke-name" style="text-transform: uppercase; color: var(--poke-blue); letter-spacing: 2px;"></h3>
        <p id="poke-desc"></p>
        <button class="btn-action" onclick="startNewGame()" style="width: 100%; background: var(--poke-blue); color: white; margin-top: 10px;">¡NUEVA PARTIDA!</button>
    </div>

    <script>
        let targetName = "";
        let revealedLetters = [];
        let wrongLetters = [];
        let pokemonData = null;

        const typeTranslations = {
            normal: "Normal", fighting: "Lucha", flying: "Volador", poison: "Veneno", ground: "Tierra", 
            rock: "Roca", bug: "Bicho", ghost: "Fantasma", steel: "Acero", fire: "Fuego", 
            water: "Agua", grass: "Planta", electric: "Eléctrico", psychic: "Psíquico", 
            ice: "Hielo", dragon: "Dragón", dark: "Siniestro", fairy: "Hada"
        };

        async function startNewGame() {
            document.getElementById('word-grid').innerHTML = "...";
            document.getElementById('letters-box').innerHTML = "";
            document.getElementById('hint-display').innerText = "¡Un Pokémon salvaje ha aparecido!";
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';
            wrongLetters = [];

            const randomId = Math.floor(Math.random() * 1010) + 1;
            
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await response.json();
                const speciesRes = await fetch(data.species.url);
                const speciesData = await speciesRes.json();
                
                let region = "Kanto";
                if (randomId > 151) region = "Johto";
                if (randomId > 251) region = "Hoenn";
                if (randomId > 386) region = "Sinnoh";
                if (randomId > 493) region = "Teselia";
                if (randomId > 649) region = "Kalos";
                if (randomId > 721) region = "Alola";
                if (randomId > 809) region = "Galar";
                if (randomId > 905) region = "Paldea";

                const desc = speciesData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text || "Datos no registrados en la Pokédex.";
                
                pokemonData = {
                    name: data.name.split('-')[0].toLowerCase(),
                    img: data.sprites.other['official-artwork'].front_default,
                    desc: desc.replace(/\n|\f/g, ' '),
                    type: data.types.map(t => typeTranslations[t.type.name] || t.type.name).join(' / '),
                    region: region
                };

                targetName = pokemonData.name;
                revealedLetters = new Array(targetName.length).fill(null);
                renderBoard();
            } catch (e) { console.error(e); }
        }

        function renderBoard() {
            const container = document.getElementById('word-grid');
            container.innerHTML = "";
            for (let i = 0; i < targetName.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile' + (revealedLetters[i] ? ' revealed' : '');
                tile.innerText = revealedLetters[i] || "";
                container.appendChild(tile);
            }
        }

        function checkLetter() {
            const input = document.getElementById('letter-input');
            const letter = input.value.toLowerCase().trim();
            input.value = "";
            input.focus();

            if (!letter || !/[a-z]/.test(letter) || revealedLetters.includes(letter) || wrongLetters.includes(letter)) return;

            if (targetName.includes(letter)) {
                for (let i = 0; i < targetName.length; i++) {
                    if (targetName[i] === letter) revealedLetters[i] = letter;
                }
                renderBoard();
                if (!revealedLetters.includes(null)) endGame(false);
            } else {
                wrongLetters.push(letter);
                updateDiscarded();
            }
        }

        function updateDiscarded() {
            const list = document.getElementById('letters-box');
            list.innerHTML = "";
            wrongLetters.sort().forEach(l => {
                const div = document.createElement('div');
                div.className = 'bad-letter';
                div.innerText = l.toUpperCase();
                list.appendChild(div);
            });
        }

        function getHint(type) {
            const display = document.getElementById('hint-display');
            display.innerText = (type === 'region') ? `Avistado en: ${pokemonData.region}` : `Elemento: ${pokemonData.type}`;
        }

        function endGame(surrender) {
            document.getElementById('modal-title').innerText = surrender ? "¡EL POKÉMON ESCAPÓ!" : "¡POKÉMON CAPTURADO!";
            document.getElementById('poke-img').src = pokemonData.img;
            document.getElementById('poke-name').innerText = pokemonData.name;
            document.getElementById('poke-desc').innerText = pokemonData.desc;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }

        document.getElementById('letter-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLetter();
        });

        startNewGame();
    </script>
</body>
</html>
