<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké-Ahorcado</title>
    <style>
        :root {
            /* Paleta de colores elegante y moderna */
            --header-bg: #2c3e50; /* Azul Pizarra Profundo */
            --accent-gold: #d4af37; /* Oro para detalles */
            --bg-dark: #121213;
            --tile-bg: #272729;
            --correct: #538d4e;
            --text-main: #ffffff;
            --text-muted: #818384;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Cabecera Sobria */
        header {
            background-color: var(--header-bg);
            width: 100%;
            padding: 25px 0;
            text-align: center;
            border-bottom: 3px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 6px;
            font-weight: 300;
            text-transform: uppercase;
            color: var(--text-main);
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cuadrícula de palabra */
        #word-grid {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tile {
            width: 45px;
            height: 45px;
            background: var(--tile-bg);
            border: 2px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase; /* Asegura mayúsculas visuales */
            transition: transform 0.2s;
        }

        .tile.revealed {
            background-color: var(--correct);
            border-color: var(--correct);
            transform: scale(1.05);
        }

        /* Pistas y Estado */
        .hints {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-hint {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        #hint-display {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            min-height: 1.2rem;
            text-align: center;
        }

        /* Controles de entrada */
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        #letter-input {
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
            text-align: center;
            border: 2px solid #565758;
            background: #121213;
            color: white;
            border-radius: 8px;
            text-transform: uppercase;
            outline: none;
        }

        #letter-input:focus {
            border-color: var(--accent-gold);
        }

        .btn-action {
            background: var(--header-bg);
            color: white;
            border: 1px solid #565758;
            padding: 0 25px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-surrender {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.8rem;
            margin-bottom: 30px;
        }

        /* Letras descartadas */
        .discarded {
            width: 100%;
            text-align: center;
            border-top: 1px solid #3a3a3c;
            padding-top: 20px;
        }

        #letters-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .bad-letter {
            background: #272729;
            color: #565758;
            width: 30px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Modal Resultado */
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10; }
        #result-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e1f; padding: 30px; border-radius: 12px; z-index: 11; width: 85%; max-width: 400px; text-align: center;
            border: 1px solid var(--accent-gold);
        }
        #result-modal img { width: 180px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        #result-modal h2 { margin: 10px 0; color: var(--correct); letter-spacing: 2px; }
        #result-modal p { color: #ccc; font-size: 0.9rem; line-height: 1.6; text-align: justify; margin: 15px 0; }
    </style>
</head>
<body>

    <header>
        <h1>Poké Ahorcado</h1>
    </header>

    <div id="game-container">
        <div class="hints">
            <button class="btn-hint" onclick="getHint('region')">Región</button>
            <button class="btn-hint" onclick="getHint('type')">Tipo</button>
        </div>
        
        <div id="hint-display">Detectando Pokémon salvaje...</div>

        <div id="word-grid"></div>

        <div class="input-area">
            <input type="text" id="letter-input" maxlength="1" autocomplete="off" autofocus>
            <button class="btn-action" onclick="checkLetter()">Adivinar</button>
        </div>
        
        <button class="btn-surrender" onclick="endGame(true)">Rendirse</button>

        <div class="discarded">
            <div style="font-size: 0.7rem; color: #565758; letter-spacing: 2px;">LETRAS DESCARTADAS</div>
            <div id="letters-box"></div>
        </div>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title"></h2>
        <img id="poke-img" src="" alt="">
        <h3 id="poke-name" style="text-transform: uppercase; color: var(--accent-gold); font-size: 1.5rem; margin: 10px 0;"></h3>
        <p id="poke-desc"></p>
        <button class="btn-action" onclick="startNewGame()" style="width: 100%; height: 50px; background: var(--correct); border: none;">Nueva Partida</button>
    </div>

    <script>
        let targetName = "";
        let revealedLetters = [];
        let wrongLetters = [];
        let pokemonData = null;

        const typeTranslations = {
            normal: "Normal", fighting: "Lucha", flying: "Volador", poison: "Veneno", ground: "Tierra", 
            rock: "Roca", bug: "Bicho", ghost: "Fantasma", steel: "Acero", fire: "Fuego", 
            water: "Agua", grass: "Planta", electric: "Eléctrico", psychic: "Psíquico", 
            ice: "Hielo", dragon: "Dragón", dark: "Siniestro", fairy: "Hada"
        };

        async function startNewGame() {
            document.getElementById('word-grid').innerHTML = "...";
            document.getElementById('letters-box').innerHTML = "";
            document.getElementById('hint-display').innerText = "Buscando rastro de Pokémon...";
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('letter-input').value = "";
            wrongLetters = [];

            const randomId = Math.floor(Math.random() * 1010) + 1;
            
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await response.json();
                const speciesRes = await fetch(data.species.url);
                const speciesData = await speciesRes.json();
                
                let region = "Kanto";
                if (randomId > 151) region = "Johto";
                if (randomId > 251) region = "Hoenn";
                if (randomId > 386) region = "Sinnoh";
                if (randomId > 493) region = "Teselia";
                if (randomId > 649) region = "Kalos";
                if (randomId > 721) region = "Alola";
                if (randomId > 809) region = "Galar";
                if (randomId > 905) region = "Paldea";

                const desc = speciesData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text || "Descripción no disponible en la base de datos.";
                
                pokemonData = {
                    name: data.name.split('-')[0].toLowerCase(),
                    img: data.sprites.other['official-artwork'].front_default,
                    desc: desc.replace(/\n|\f/g, ' '),
                    type: data.types.map(t => typeTranslations[t.type.name] || t.type.name).join(' / '),
                    region: region
                };

                targetName = pokemonData.name;
                revealedLetters = new Array(targetName.length).fill(null);
                document.getElementById('hint-display').innerText = "¡Pokémon detectado! ¿Quién es?";
                renderBoard();
            } catch (e) { console.error(e); }
        }

        function renderBoard() {
            const container = document.getElementById('word-grid');
            container.innerHTML = "";
            for (let i = 0; i < targetName.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile' + (revealedLetters[i] ? ' revealed' : '');
                // Convertimos siempre a Mayúsculas
                tile.innerText = revealedLetters[i] ? revealedLetters[i].toUpperCase() : "";
                container.appendChild(tile);
            }
        }

        function checkLetter() {
            const input = document.getElementById('letter-input');
            const letter = input.value.toLowerCase().trim();
            input.value = "";
            input.focus();

            if (!letter || !/[a-z]/.test(letter) || revealedLetters.includes(letter) || wrongLetters.includes(letter)) return;

            if (targetName.includes(letter)) {
                for (let i = 0; i < targetName.length; i++) {
                    if (targetName[i] === letter) revealedLetters[i] = letter;
                }
                renderBoard();
                if (!revealedLetters.includes(null)) endGame(false);
            } else {
                wrongLetters.push(letter);
                updateDiscarded();
            }
        }

        function updateDiscarded() {
            const list = document.getElementById('letters-box');
            list.innerHTML = "";
            wrongLetters.sort().forEach(l => {
                const div = document.createElement('div');
                div.className = 'bad-letter';
                div.innerText = l.toUpperCase();
                list.appendChild(div);
            });
        }

        function getHint(type) {
            const display = document.getElementById('hint-display');
            display.innerText = (type === 'region') ? `Región de origen: ${pokemonData.region}` : `Tipo elemental: ${pokemonData.type}`;
        }

        function endGame(surrender) {
            document.getElementById('modal-title').innerText = surrender ? "EL POKÉMON HUYÓ..." : "¡CONSEGUIDO!";
            document.getElementById('poke-img').src = pokemonData.img;
            document.getElementById('poke-name').innerText = pokemonData.name;
            document.getElementById('poke-desc').innerText = pokemonData.desc;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }

        document.getElementById('letter-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLetter();
        });

        startNewGame();
    </script>
</body>
</html>
