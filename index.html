<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Poké Ahorcado</title>
    <style>
        :root {
            --poke-blue: #3B4CCA;
            --poke-yellow: #FFCB05;
            --bg-dark: #121213;
            --tile-bg: #272729;
            --correct: #538d4e;
            --text-main: #ffffff;
            --border-soft: #3a3a3c;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background-color: var(--poke-blue);
            border-bottom: 4px solid var(--poke-yellow);
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--poke-yellow); text-transform: uppercase; }

        #game-container {
            width: 95%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #attempts-counter {
            font-size: 0.8rem;
            color: var(--poke-yellow);
            font-weight: bold;
            margin-bottom: 5px;
        }

        #word-grid {
            display: flex;
            gap: 5px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tile {
            width: 40px;
            height: 40px;
            background: var(--tile-bg);
            border: 2px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tile.revealed { background-color: var(--correct); border-color: var(--correct); }

        .input-area {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        #letter-input {
            width: 60px;
            height: 60px;
            font-size: 2rem;
            text-align: center;
            border: 2px solid var(--border-soft);
            background: #1e1e1f;
            color: white;
            border-radius: 8px;
            text-transform: uppercase;
            /* Evita zoom automático en iPhone */
            font-size: 16px; 
            font-size: 2rem;
        }

        /* Animación de error si la letra ya se usó */
        .shake { animation: shake 0.3s; border-color: #ff4444 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-action {
            background: var(--poke-blue);
            color: white;
            border: 1px solid var(--poke-yellow);
            padding: 0 20px;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .discarded {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-soft);
        }

        #letters-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin-top: 8px;
        }

        .bad-letter {
            background: #1a1a1b;
            color: #444;
            width: 28px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.8rem;
            text-decoration: line-through;
        }

        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10; }
        #result-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e1f; padding: 20px; border-radius: 15px; z-index: 11; width: 85%; max-width: 350px; text-align: center;
            border: 2px solid var(--poke-yellow);
        }
        #result-modal img { width: 140px; }
        #capture-text { color: var(--correct); font-weight: bold; margin: 10px 0; }
        #poke-desc { color: #ccc; font-size: 0.8rem; text-align: justify; height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

    <header>
        <h1>Poké Ahorcado</h1>
    </header>

    <div id="game-container">
        <div id="attempts-counter">INTENTOS: 0</div>
        
        <div id="hint-display" style="font-size: 0.8rem; color: #888;">Introduce una letra</div>

        <div id="word-grid"></div>

        <div class="input-area">
            <!-- inputmode="alpha" ayuda a que el móvil prefiera el teclado de letras -->
            <input type="text" id="letter-input" maxlength="1" inputmode="alpha" autocomplete="off" autofocus>
            <button class="btn-action" onclick="checkLetter()">Lanzar</button>
        </div>
        
        <div class="discarded">
            <div style="font-size: 0.6rem; color: #565758; font-weight: bold;">LETRAS DESCARTADAS</div>
            <div id="letters-box"></div>
        </div>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="color: var(--poke-yellow); font-size: 1rem;"></h2>
        <img id="poke-img" src="" alt="">
        <h3 id="poke-name" style="text-transform: uppercase; color: white; margin: 5px 0;"></h3>
        <div id="capture-text"></div>
        <p id="poke-desc"></p>
        <button class="btn-action" onclick="startNewGame()" style="width: 100%; height: 45px; background: var(--correct); border: none; margin-top: 10px;">Reintentar</button>
    </div>

    <script>
        let targetName = "";
        let revealedLetters = [];
        let usedLetters = new Set();
        let attempts = 0;
        let pokemonData = null;

        const inputEl = document.getElementById('letter-input');

        // Bloqueo de caracteres no deseados en tiempo real
        inputEl.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            // Solo permite letras a-z
            if (!/^[a-z]$/.test(val)) {
                e.target.value = "";
                return;
            }
            // Si la letra ya fue usada, avisar visualmente
            if (usedLetters.has(val)) {
                inputEl.classList.add('shake');
                setTimeout(() => inputEl.classList.remove('shake'), 300);
                e.target.value = "";
            }
        });

        async function startNewGame() {
            attempts = 0;
            usedLetters = new Set();
            document.getElementById('attempts-counter').innerText = "INTENTOS: 0";
            document.getElementById('word-grid').innerHTML = "Cargando...";
            document.getElementById('letters-box').innerHTML = "";
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';

            const randomId = Math.floor(Math.random() * 1010) + 1;
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await response.json();
                const speciesRes = await fetch(data.species.url);
                const speciesData = await speciesRes.json();
                
                pokemonData = {
                    name: data.name.split('-')[0].toLowerCase(),
                    img: data.sprites.other['official-artwork'].front_default,
                    desc: speciesData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text.replace(/\n|\f/g, ' ') || "Sin datos.",
                };

                targetName = pokemonData.name;
                revealedLetters = new Array(targetName.length).fill(null);
                renderBoard();
            } catch (e) { console.error(e); }
        }

        function renderBoard() {
            const container = document.getElementById('word-grid');
            container.innerHTML = "";
            for (let i = 0; i < targetName.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile' + (revealedLetters[i] ? ' revealed' : '');
                tile.innerText = revealedLetters[i] ? revealedLetters[i].toUpperCase() : "";
                container.appendChild(tile);
            }
        }

        function checkLetter() {
            const letter = inputEl.value.toLowerCase().trim();
            if (!letter || usedLetters.has(letter)) return;

            usedLetters.add(letter);
            attempts++;
            document.getElementById('attempts-counter').innerText = `INTENTOS: ${attempts}`;

            if (targetName.includes(letter)) {
                for (let i = 0; i < targetName.length; i++) {
                    if (targetName[i] === letter) revealedLetters[i] = letter;
                }
                renderBoard();
                if (!revealedLetters.includes(null)) endGame(false);
            } else {
                updateDiscarded();
            }
            inputEl.value = "";
            inputEl.focus();
        }

        function updateDiscarded() {
            const list = document.getElementById('letters-box');
            list.innerHTML = "";
            [...usedLetters].filter(l => !targetName.includes(l)).sort().forEach(l => {
                const div = document.createElement('div');
                div.className = 'bad-letter';
                div.innerText = l.toUpperCase();
                list.appendChild(div);
            });
        }

        function endGame(surrender) {
            document.getElementById('modal-title').innerText = "¡POKÉMON CAPTURADO!";
            document.getElementById('capture-text').innerText = `¡Pokémon capturado en ${attempts} intentos!`;
            document.getElementById('poke-img').src = pokemonData.img;
            document.getElementById('poke-name').innerText = pokemonData.name.toUpperCase();
            document.getElementById('poke-desc').innerText = pokemonData.desc;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }

        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLetter(); });
        startNewGame();
    </script>
</body>
</html>
