<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéWordle Mobile</title>
    <style>
        :root {
            --color-correct: #538d4e;
            --color-absent: #3a3a3c;
            --color-tile-border: #3a3a3c;
            --bg-color: #121213;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        header {
            border-bottom: 1px solid var(--color-tile-border);
            width: 100%;
            text-align: center;
            padding: 10px 0;
            margin-bottom: 15px;
        }

        h1 { margin: 0; letter-spacing: 1px; font-size: 1.5rem; }

        /* Contenedor de la palabra adaptable */
        #word-grid {
            display: flex;
            gap: 5px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 100%;
        }

        .tile {
            width: 40px;
            height: 40px;
            border: 2px solid var(--color-tile-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            transition: background-color 0.4s;
        }

        @media (min-width: 600px) {
            .tile { width: 55px; height: 55px; font-size: 2rem; }
            h1 { font-size: 2rem; }
        }

        .tile.correct {
            background-color: var(--color-correct);
            border-color: var(--color-correct);
        }

        /* Pistas */
        .hints-container {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-hint {
            background: #272729;
            border: 1px solid #565758;
            color: #d7dadc;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        #hint-text {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-transform: none;
            height: 1.2rem;
            text-align: center;
        }

        /* Entrada de texto */
        .input-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        #letter-input {
            background: #121213;
            border: 2px solid #565758;
            color: white;
            font-size: 1.8rem;
            width: 60px;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            outline: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-main {
            background-color: #818384;
            color: white;
            border: none;
            padding: 15px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .btn-surrender { background-color: #a33333; }

        /* Letras descartadas */
        .discarded-area {
            margin-top: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        #letters-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .key-absent {
            background-color: var(--color-absent);
            width: 30px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Modal */
        #modal-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            z-index: 10;
        }

        #result-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e1f;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            z-index: 11;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }

        #result-modal img { width: 140px; margin: 10px 0; }
        #result-modal p { text-transform: none; color: #ccc; font-size: 0.9rem; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <header>
        <h1>POKÉWORDLE</h1>
    </header>

    <div class="hints-container">
        <button class="btn-hint" onclick="getHint('region')">Pista: Región</button>
        <button class="btn-hint" onclick="getHint('type')">Pista: Tipo</button>
    </div>
    <div id="hint-text"></div>

    <div id="word-grid"></div>

    <div class="input-section">
        <input type="text" id="letter-input" maxlength="1" inputmode="text" autocomplete="off">
        <div class="button-group">
            <button class="btn-main" onclick="checkLetter()">ENVIAR</button>
            <button class="btn-main btn-surrender" onclick="endGame(true)">ME RINDO</button>
        </div>
    </div>

    <div class="discarded-area">
        <div style="font-size: 0.7rem; color: #565758; letter-spacing: 1px;">LETRAS DESCARTADAS</div>
        <div id="letters-box"></div>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="font-size: 1.2rem;"></h2>
        <img id="poke-img" src="" alt="">
        <h3 id="poke-name" style="color: var(--color-correct); margin: 5px 0;"></h3>
        <p id="poke-desc"></p>
        <button class="btn-main" onclick="startNewGame()" style="background-color: var(--color-correct); width: 100%; margin-top: 15px;">VOLVER A JUGAR</button>
    </div>

    <script>
        let targetName = "";
        let revealedLetters = [];
        let wrongLetters = [];
        let pokemonData = null;

        const typeTranslations = {
            normal: "Normal", fighting: "Lucha", flying: "Volador", poison: "Veneno",
            ground: "Tierra", rock: "Roca", bug: "Bicho", ghost: "Fantasma",
            steel: "Acero", fire: "Fuego", water: "Agua", grass: "Planta",
            electric: "Eléctrico", psychic: "Psíquico", ice: "Hielo", dragon: "Dragón",
            dark: "Siniestro", fairy: "Hada"
        };

        async function startNewGame() {
            document.getElementById('word-grid').innerHTML = "Cargando...";
            document.getElementById('letters-box').innerHTML = "";
            document.getElementById('hint-text').innerText = "";
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('letter-input').value = "";
            wrongLetters = [];

            const randomId = Math.floor(Math.random() * 1010) + 1;
            
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await response.json();
                const speciesRes = await fetch(data.species.url);
                const speciesData = await speciesRes.json();
                
                let region = "Kanto";
                if (randomId > 151) region = "Johto";
                if (randomId > 251) region = "Hoenn";
                if (randomId > 386) region = "Sinnoh";
                if (randomId > 493) region = "Teselia";
                if (randomId > 649) region = "Kalos";
                if (randomId > 721) region = "Alola";
                if (randomId > 809) region = "Galar";
                if (randomId > 905) region = "Paldea";

                const desc = speciesData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text || "Sin descripción.";
                const translatedTypes = data.types.map(t => typeTranslations[t.type.name] || t.type.name).join(' / ');

                pokemonData = {
                    name: data.name.split('-')[0].toLowerCase(),
                    img: data.sprites.other['official-artwork'].front_default,
                    desc: desc.replace(/\n|\f/g, ' '),
                    type: translatedTypes,
                    region: region
                };

                targetName = pokemonData.name;
                revealedLetters = new Array(targetName.length).fill(null);
                renderBoard();
            } catch (e) {
                document.getElementById('word-grid').innerHTML = "Error de conexión";
            }
        }

        function renderBoard() {
            const container = document.getElementById('word-grid');
            container.innerHTML = "";
            revealedLetters.forEach(letter => {
                const tile = document.createElement('div');
                tile.className = 'tile' + (letter ? ' correct' : '');
                tile.innerText = letter || "";
                container.appendChild(tile);
            });
        }

        function checkLetter() {
            const input = document.getElementById('letter-input');
            const letter = input.value.toLowerCase().trim();
            input.value = "";
            input.focus();

            if (!letter || !/[a-z]/.test(letter) || revealedLetters.includes(letter) || wrongLetters.includes(letter)) return;

            if (targetName.includes(letter)) {
                for (let i = 0; i < targetName.length; i++) {
                    if (targetName[i] === letter) revealedLetters[i] = letter;
                }
                renderBoard();
                if (!revealedLetters.includes(null)) endGame(false);
            } else {
                wrongLetters.push(letter);
                updateDiscarded();
            }
        }

        function updateDiscarded() {
            const list = document.getElementById('letters-box');
            list.innerHTML = "";
            wrongLetters.sort().forEach(l => {
                const div = document.createElement('div');
                div.className = 'key-absent';
                div.innerText = l.toUpperCase();
                list.appendChild(div);
            });
        }

        function getHint(type) {
            const hintBox = document.getElementById('hint-text');
            if (type === 'region') hintBox.innerText = `REGIÓN: ${pokemonData.region}`;
            else hintBox.innerText = `TIPO: ${pokemonData.type}`;
        }

        function endGame(surrender) {
            document.getElementById('modal-title').innerText = surrender ? "¡OH NO!" : "¡CONSEGUIDO!";
            document.getElementById('poke-img').src = pokemonData.img;
            document.getElementById('poke-name').innerText = pokemonData.name.toUpperCase();
            document.getElementById('poke-desc').innerText = pokemonData.desc;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }

        document.getElementById('letter-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLetter();
        });

        startNewGame();
    </script>
</body>
</html>
